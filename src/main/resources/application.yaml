spring:
  application:
    name: pabal

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

pabal:
  security:
    jwt:
      issuer-uri: ${ISSUER_URI}
      audience: pabal-api
      user-id-claim: uid
      tenant-id-claim: tenant_id
      principal-claim: sub
      clock-skew: 30s

  websocket:
    relay:
      enabled: false
      host: rabbitmq-stomp
      port: 61613
      client-login: ${STOMP_CLIENT_LOGIN}
      client-passcode: ${STOMP_CLIENT_PASSCODE}
      system-login: ${STOMP_SYSTEM_LOGIN}
      system-passcode: ${STOMP_SYSTEM_PASSCODE}
      virtual-host: /
      system-heartbeat-send-interval: 10000
      system-heartbeat-receive-interval: 10000
    endpoint:
      path: /websocket
      allowed-origin-patterns:
        - http://localhost:5173
        - http://localhost:3000
        - http://127.0.0.1:5173
        - http://127.0.0.1:3000
      sock-js-enabled: true