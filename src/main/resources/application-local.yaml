spring:
  datasource:
    url: jdbc:postgresql://localhost:${PABAL_POSTGRES_PORT:5432}/${PABAL_POSTGRES_DB:pabal}
    driver-class-name: org.postgresql.Driver
    username: ${PABAL_POSTGRES_USER}
    password: ${PABAL_POSTGRES_PASSWORD}
  docker:
    compose:
      enabled: true
      file: compose.local.yaml
      lifecycle-management: start-and-stop

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  sql:
    init:
      mode: never

pabal:
  security:
    jwt:
      issuer-uri: local-dev
      audience: pabal-api
      user-id-claim: uid
      tenant-id-claim: tenant_id
      principal-claim: sub
      local-secret: ${PABAL_JWT_LOCAL_SECRET}

  websocket:
    relay:
      enabled: false
    endpoint:
      path: /websocket
      allowed-origin-patterns:
        - http://localhost:5173
        - http://localhost:3000
        - http://127.0.0.1:5173
        - http://127.0.0.1:3000
      sock-js-enabled: true

management:
  health:
    redis:
      enabled: true

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.security: DEBUG
    com.polarishb.pabal.messenger.infrastructure.realtime.ws: TRACE
    com.polarishb.pabal.messenger.infrastructure.config: TRACE
    com.polarishb.pabal.security: TRACE
    org.flywaydb: DEBUG
    org.springframework.boot.flyway: DEBUG