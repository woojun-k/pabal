spring:
  datasource:
    url: jdbc:h2:mem:pabal_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/pabal
          jwk-set-uri: http://localhost:8080/auth/realms/pabal/protocol/openid-connect/certs
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
      auto-offset-reset: earliest

pabal:
  security:
    jwt:
      issuer-uri: "http://localhost:8080/auth/realms/pabal"
      audience: "pabal-client"
      user-id-claim: "sub"
      tenant-id-claim: "tenant_id"
      principal-claim: "preferred_username"
      clock-skew: 60s
      local-secret: 01234567890123456789012345678901
  websocket:
    endpoint:
      path: "/ws"
      allowed-origin-patterns:
        - "*"
      sock-js-enabled: true
    relay:
      enabled: false
      host: "localhost"
      port: 61613
      client-login: "guest"
      client-passcode: "guest"
      system-login: "guest"
      system-passcode: "guest"
      virtual-host: "/"
      system-heartbeat-send-interval: 10000
      system-heartbeat-receive-interval: 10000

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.polarishb.pabal: DEBUG
